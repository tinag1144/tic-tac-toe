<!DOCTYPE html>
<html lang="es">
  <head>
    <!-- Aquí defino las etiquetas meta esenciales que nos pidió el profesor para el manejo de caracteres y diseño responsivo -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Juego de Tres en Raya interactivo utilizando modelos de TensorFlow.js basados en el método del libro." />
    <meta name="keywords" content="TensorFlow.js, Tic Tac Toe, Redes Neuronales, Inteligencia Artificial, Minimax" />
    <meta name="author" content="Estudiante de Programación" />

    <title>Tic-Tac-Toe con TensorFlow.js (Pink Edition)</title>
    
    <!-- Cargo la librería de TensorFlow.js mediante el CDN oficial indicado en la clase del Chapter 5 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.0.0/dist/tf.min.js"></script>
    
    <style>
      /* Aquí personalicé todo el estilo visual con una estética rosita pastel (Pink/Coquette) para la interfaz */
      body {
        font-family: 'Segoe UI', sans-serif;
        text-align: center;
        background-color: #fff0f5;
        margin-top: 30px;
        color: #4a4a4a;
      }
      h1 { 
        color: #ff69b4;
        text-shadow: 1px 1px 2px #ffb6c1;
        margin-bottom: 10px;
      }
      #status {
        font-size: 20px;
        margin-bottom: 20px;
        font-weight: bold;
        color: #db7093;
        background-color: #ffe4e1;
        display: inline-block;
        padding: 8px 20px;
        border-radius: 20px;
        border: 1px solid #ffb6c1;
      }
      .difficulty-container {
        margin-bottom: 20px;
      }
      .difficulty-container label {
        font-weight: bold;
        color: #db7093;
        margin-right: 10px;
      }
      select {
        padding: 6px 15px;
        border-radius: 15px;
        border: 2px solid #ffb6c1;
        background-color: white;
        color: #db7093;
        font-weight: bold;
        cursor: pointer;
        outline: none;
      }
      select:hover {
        border-color: #ff69b4;
      }
      .board {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        grid-template-rows: repeat(3, 100px);
        gap: 8px;
        justify-content: center;
        margin-bottom: 25px;
      }
      .cell {
        width: 100px;
        height: 100px;
        background-color: #ffffff;
        border: 2px solid #ffb6c1;
        border-radius: 12px;
        font-size: 42px;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        user-select: none;
        box-shadow: 0 4px 6px rgba(255, 182, 193, 0.2);
        transition: all 0.2s ease;
      }
      .cell.x-player { color: #ff1493; }
      .cell.o-player { color: #ba55d3; }
      .cell:hover { background-color: #fff5f7; border-color: #ff69b4; transform: scale(1.02); }
      .cell.taken { cursor: not-allowed; background-color: #fafafa; transform: none; }
      button {
        padding: 12px 25px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        background-color: #ff69b4;
        color: white;
        border: none;
        border-radius: 25px;
        box-shadow: 0 4px 10px rgba(255, 105, 180, 0.4);
      }
      button:hover { background-color: #ff1493; }
    </style>
  </head>
  <body>
    <h1>🌸 Tres en Raya Inteligente 🌸</h1>
    
    <div class="difficulty-container">
      <label for="difficulty">Dificultad de la IA: </label>
      <select id="difficulty">
        <option value="easy">Fácil (Modelo del Libro de IA) 🧠</option>
        <option value="impossible">Imbatible (Algoritmo Minimax) 👑</option>
      </select>
    </div>

    <div id="status">Cargando modelo de IA...</div>

    <div class="board" id="board">
      <div class="cell" data-index="0"></div>
      <div class="cell" data-index="1"></div>
      <div class="cell" data-index="2"></div>
      <div class="cell" data-index="3"></div>
      <div class="cell" data-index="4"></div>
      <div class="cell" data-index="5"></div>
      <div class="cell" data-index="6"></div>
      <div class="cell" data-index="7"></div>
      <div class="cell" data-index="8"></div>
    </div>

    <button onclick="resetGame()">Reiniciar Juego 💕</button>
    <script>
      let model = null;
      
      // Defino el estado del tablero lineal de 9 casillas idéntico al del libro:
      // 0 = casilla vacía, 1 = Yo (Humano), -1 = La IA
      let boardState = [0, 0, 0, 0, 0, 0, 0, 0, 0];
      let gameActive = false;

      const statusDiv = document.getElementById('status');
      const cells = document.querySelectorAll('.cell');
      const difficultySelect = document.getElementById('difficulty');

      // Almaceno aquí las combinaciones ganadoras tradicionales para comprobar el fin del juego
      const winPatterns = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8], // Horizontales
        [0, 3, 6], [1, 4, 7], [2, 5, 8], // Verticales
        [0, 4, 8], [2, 4, 6]              // Diagonales
      ];

      // Verifico que TensorFlow esté listo e inicializo la carga del modelo local
      tf.ready().then(() => {
        // Apunto a la ruta donde guardamos el JSON del modelo entrenado
        const modelPath = 'model/ttt_model.json';
        
        // Uso tf.tidy() para limpiar automáticamente la memoria gráfica (WebGL) tras cargar el modelo
        tf.tidy(() => {
          tf.loadLayersModel(modelPath).then((loadedModel) => {
            model = loadedModel; // Guardo el modelo en mi variable global
            statusDiv.innerText = "✨ ¡Tu turno! Juegas con 'X' ✨";
            gameActive = true;
            setupEventListeners();
          }).catch(err => {
            statusDiv.innerText = "❌ Error al cargar el modelo.";
            console.error(err);
          });
        });
      });

      // Escucho los eventos de click en cada una de las celdas del tablero
      function setupEventListeners() {
        cells.forEach(cell => {
          cell.addEventListener('click', (e) => {
            const index = parseInt(e.target.getAttribute('data-index'));
            
            // Si la casilla está vacía (0) y el juego está activo, proceso mi jugada humana
            if (boardState[index] === 0 && gameActive) {
              makeMove(index, 1, 'X', 'x-player'); // Registro mi jugada como un '1'
              
              // Si con mi tiro no termina la partida, bloqueo la pantalla y le doy el turno a la IA
              if (!checkGameOver(boardState, true)) {
                statusDiv.innerText = "🧠 Pensando la IA...";
                gameActive = false; 
                
                // Agrego un pequeño retraso de 400ms para simular procesamiento
                setTimeout(() => {
                  aiTurn();
                }, 400);
              }
            }
          });
        });
      }

      // Con esta función pinto la interfaz visual y actualizo el estado lógico del arreglo matemático
      function makeMove(index, playerValue, symbol, cssClass) {
        boardState[index] = playerValue;
        cells[index].innerText = symbol;
        cells[index].classList.add('taken', cssClass);
      }

      // Evalúo el selector de la interfaz para saber qué lógica aplicar en el turno de la IA
      function aiTurn() {
        const difficulty = difficultySelect.value;
        if (difficulty === 'easy') {
          aiMoveBookModel(); // Uso el modelo de redes neuronales básico del libro
        } else {
          aiMoveImpossible(); // Uso el algoritmo de búsqueda Minimax imbatible
        }
      }

      // MODO FÁCIL: Aquí aplico estrictamente el método matemático del Chapter 5 del libro
      function aiMoveBookModel() {
        // Encapsulo en tf.tidy() para que TensorFlow destruya los tensores intermedios y no congele el navegador
        tf.tidy(() => {
          // Convierto mi arreglo de JS en un Tensor de dos dimensiones apto para el modelo
          const inputTensor = tf.tensor2d([boardState], [1, 9]);
          
          // Ejecuto la predicción de la red neuronal pasando el estado actual
          const prediction = model.predict(inputTensor);
          
          // Saco los valores numéricos del tensor de vuelta a un formato plano ejecutable en JS
          const probabilities = prediction.dataSync();

          let bestMove = -1;
          let highestProb = -Infinity;

          // Recorro las casillas buscando la opción ideal bajo la regla del libro:
          // Evalúo únicamente las casillas que lógicamente valen cero (vacias)
          for (let i = 0; i < 9; i++) {
            if (boardState[i] === 0) {
              // Elijo el índice que contenga la probabilidad de peso más alta
              if (probabilities[i] > highestProb) {
                highestProb = probabilities[i];
                bestMove = i;
              }
            }
          }

          // Si el modelo decide una casilla legal, ejecuto el tiro asignándole el valor de -1
          if (bestMove !== -1) {
            makeMove(bestMove, -1, 'O', 'o-player');
          }
          
          // Si la máquina no provoca fin de juego, me devuelve el control
          if (!checkGameOver(boardState, true)) {
            statusDiv.innerText = "✨ Tu turno. Juegas con 'X' ✨";
            gameActive = true;
          }
        });
      }

      // MODO IMBATIBLE: Aquí implemento un árbol de decisiones mediante Minimax para prevenir fallas
      function aiMoveImpossible() {
        let bestScore = -Infinity;
        let move = -1;
        
        // Exploro recursivamente cada casilla vacía del tablero simulando las consecuencias
        for (let i = 0; i < 9; i++) {
          if (boardState[i] === 0) {
            boardState[i] = -1; // Simulo que la IA tira aquí
            let score = minimax(boardState, 0, false); // Calculo el puntaje resultante
            boardState[i] = 0; // Deshago la simulación para no alterar el tablero real
            
            // Me quedo con el movimiento que maximice mis opciones de victoria
            if (score > bestScore) {
              bestScore = score;
              move = i;
            }
          }
        }
        
        if (move !== -1) {
          makeMove(move, -1, 'O', 'o-player');
        }
        
        if (!checkGameOver(boardState, true)) {
          statusDiv.innerText = "✨ Tu turno. Juegas con 'X' ✨";
          gameActive = true;
        }
      }

      // Este es el motor recursivo que puntúa el árbol de juego (Maximiza IA, Minimiza Humano)
      function minimax(state, depth, isMaximizing) {
        let result = evaluateBoard(state);
        if (result !== null) return result; // Si el estado es terminal, devuelvo su puntuación base

        if (isMaximizing) {
          let bestScore = -Infinity;
          for (let i = 0; i < 9; i++) {
            if (state[i] === 0) {
              state[i] = -1;
              let score = minimax(state, depth + 1, false);
              state[i] = 0;
              bestScore = Math.max(score, bestScore);
            }
          }
          return bestScore;
        } else {
          let bestScore = Infinity;
          for (let i = 0; i < 9; i++) {
            if (state[i] === 0) {
              state[i] = 1;
              let score = minimax(state, depth + 1, true);
              state[i] = 0;
              bestScore = Math.min(score, bestScore);
            }
          }
          return bestScore;
        }
      }

      // Asigno pesos matemáticos rápidos para el Minimax: +10 si gana la máquina, -10 si gano yo, 0 empate
      function evaluateBoard(state) {
        for (let pattern of winPatterns) {
          const [a, b, c] = pattern;
          if (state[a] !== 0 && state[a] === state[b] && state[a] === state[c]) {
            return state[a] === -1 ? 10 : -10;
          }
        }
        if (!state.includes(0)) return 0;
        return null;
      }

      // Verifico de forma global si se cumple algún patrón de victoria o si nos quedamos sin casillas libres (Empate)
      function checkGameOver(state, updateUI) {
        for (let pattern of winPatterns) {
          const [a, b, c] = pattern;
          if (state[a] !== 0 && state[a] === state[b] && state[a] === state[c]) {
            if (updateUI) {
              // Imprimo el resultado directo en el contenedor de estado y detengo la partida
              statusDiv.innerText = state[a] === 1 ? "👑 ¡Ganaste tú! 🎉" : "🤖 ¡Ganó la IA! 💔";
              gameActive = false;
            }
            return true;
          }
        }

        // Si ya no hay ningún cero, declaro el empate técnico
        if (!state.includes(0)) {
          if (updateUI) {
            statusDiv.innerText = "🎀 ¡Empate! 🤝";
            gameActive = false;
          }
          return true;
        }

        return false;
      }

      // Limpio por completo el array lógico, restauro las clases de estilo CSS y devuelvo el juego al estado inicial
      function resetGame() {
        boardState = [0, 0, 0, 0, 0, 0, 0, 0, 0];
        cells.forEach(cell => {
          cell.innerText = "";
          cell.className = "cell";
        });
        if (model) {
          statusDiv.innerText = "✨ Tu turno. Juegas con 'X' ✨";
          gameActive = true;
        }
      }
    </script>
  </body>
</html>
